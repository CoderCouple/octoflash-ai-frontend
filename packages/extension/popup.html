<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #000000;
    }
    .header {
      background: #000000;
      color: #ffffff;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header svg { width: 18px; height: 18px; }
    .body { padding: 14px 16px 16px; }
    label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: block;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
      background: #ffffff;
      color: #000000;
      font-family: inherit;
    }
    input:focus, select:focus { border-color: #000000; }
    select { cursor: pointer; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .row > div { margin-bottom: 0; }
    .row + label, .row + .row { margin-top: 4px; }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    button {
      width: 100%;
      padding: 10px;
      background: #000000;
      color: #ffffff;
      border: 1px solid #000000;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      margin-bottom: 8px;
    }
    button:hover { background: #1f1f1f; border-color: #1f1f1f; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      font-size: 12px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      display: block;
      background: #ffffff;
      color: #000000;
      border: 1px solid #000000;
    }
    .status.error {
      display: block;
      background: #000000;
      color: #ffffff;
    }
    .section {
      border-top: 1px solid #e5e5e5;
      padding-top: 12px;
      margin-top: 10px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .save-btn {
      background: #ffffff;
      color: #000000;
      border: 1px solid #d4d4d8;
      font-size: 12px;
      padding: 6px;
      margin-top: 2px;
    }
    .save-btn:hover { background: #f4f4f5; border-color: #d4d4d8; }
    .hint {
      font-size: 10.5px;
      color: #6b7280;
      margin-top: -6px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#ffffff"/>
    </svg>
    Octoflash
  </div>

  <div class="body">
    <div class="field">
      <label>YouTube URL</label>
      <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=...">
    </div>

    <div class="row">
      <div class="field">
        <label>Quality</label>
        <select id="quality">
          <option value="480p">480p</option>
          <option value="720p" selected>720p</option>
          <option value="1080p">1080p</option>
          <option value="1440p">1440p</option>
          <option value="2160p">2160p (4K)</option>
        </select>
      </div>
      <div class="field">
        <label>Orientation</label>
        <select id="orientation">
          <option value="portrait" selected>Portrait</option>
          <option value="landscape">Landscape</option>
          <option value="square">Square</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Voiceover</label>
        <select id="voiceover">
          <option value="yes" selected>Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label>Length</label>
        <select id="length">
          <option value="30">30s</option>
          <option value="60">60s (1 min)</option>
          <option value="90">90s</option>
          <option value="120" selected>120s (2 min)</option>
          <option value="180">180s (3 min)</option>
          <option value="240">240s (4 min)</option>
          <option value="300">300s (5 min)</option>
        </select>
      </div>
    </div>

    <button id="queueBtn">Queue Video</button>
    <div class="status" id="status"></div>

    <div class="section">
      <div class="section-title">YouTube Connection</div>
      <div class="hint" id="ytStatus" style="margin-top: 4px;">Checking…</div>
      <button class="save-btn" id="connectYtBtn">Sync YouTube cookies</button>
    </div>

    <div class="section">
      <div class="section-title">Settings</div>
      <label>API URL</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:8000">
      <button class="save-btn" id="saveBtn">Save Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
