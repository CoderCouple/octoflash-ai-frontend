appId: com.octoflash.app
productName: Octoflash AI
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - package.json
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - "**/*"
mac:
  category: public.app-category.video
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
